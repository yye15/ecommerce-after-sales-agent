<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="980" viewBox="0 0 1480 980" role="img" aria-labelledby="title desc">
  <title id="title">基于 LangGraph、RAG 与细粒度情感分析的电商客服售后 Agent 架构图</title>
  <desc id="desc">展示用户输入、Streamlit 页面、LangGraph 多节点工作流、DeepSeek、LALUN、RAG 知识库、评估体系之间的关系。</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .panel { fill: #ffffff; stroke: #d7dce5; stroke-width: 1.4; rx: 12; }
      .panel-title { font: 700 20px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #273244; }
      .title { font: 800 30px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 400 16px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #667085; }
      .box { fill: #ffffff; stroke: #b8c2d6; stroke-width: 1.3; rx: 10; }
      .box-main { fill: #eef6ff; stroke: #3b82f6; }
      .box-ai { fill: #f0fdf4; stroke: #22c55e; }
      .box-kb { fill: #fff7ed; stroke: #f97316; }
      .box-qa { fill: #f5f3ff; stroke: #8b5cf6; }
      .box-out { fill: #fef2f2; stroke: #ef4444; }
      .node-title { font: 700 15px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2937; }
      .node-sub { font: 400 12.5px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #536071; }
      .small { font: 400 12px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #667085; }
      .arrow { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .arrow-blue { stroke: #2563eb; stroke-width: 2.1; fill: none; marker-end: url(#arrow-blue); }
      .arrow-dashed { stroke: #94a3b8; stroke-width: 1.6; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .label { font: 700 12px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #475467; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect class="bg" width="1480" height="980"/>
  <text x="54" y="58" class="title">电商客服与售后运营 Agent 系统架构</text>
  <text x="54" y="86" class="subtitle">LangGraph 编排多节点流程，结合 DeepSeek、RAG 售后政策、LALUN 情感分析实验与人工评估集，输出可执行的客服策略。</text>

  <rect x="40" y="120" width="280" height="760" class="panel"/>
  <text x="62" y="154" class="panel-title">入口与展示层</text>

  <rect x="70" y="195" width="220" height="82" class="box box-main"/>
  <text x="92" y="226" class="node-title">用户输入</text>
  <text x="92" y="250" class="node-sub">评论 / 售后对话 / 投诉</text>

  <rect x="70" y="330" width="220" height="90" class="box box-main"/>
  <text x="92" y="362" class="node-title">Streamlit 页面</text>
  <text x="92" y="386" class="node-sub">单条分析 / 批量运营分析</text>

  <rect x="70" y="665" width="220" height="92" class="box box-out"/>
  <text x="92" y="697" class="node-title">前端输出</text>
  <text x="92" y="721" class="node-sub">风险等级、策略、回复</text>
  <text x="92" y="743" class="node-sub">运营统计与改进建议</text>

  <line x1="180" y1="277" x2="180" y2="330" class="arrow-blue"/>
  <line x1="180" y1="420" x2="180" y2="665" class="arrow"/>

  <rect x="360" y="120" width="660" height="760" class="panel"/>
  <text x="384" y="154" class="panel-title">LangGraph 多节点工作流</text>
  <text x="384" y="180" class="small">把售后处理拆成可解释、可测试、可扩展的节点</text>

  <rect x="405" y="215" width="210" height="78" class="box"/>
  <text x="427" y="246" class="node-title">1. 输入理解</text>
  <text x="427" y="270" class="node-sub">清洗文本 / 识别意图</text>

  <rect x="735" y="215" width="210" height="78" class="box"/>
  <text x="757" y="246" class="node-title">2. 情感分析</text>
  <text x="757" y="270" class="node-sub">aspect / opinion / sentiment</text>

  <rect x="405" y="345" width="210" height="78" class="box"/>
  <text x="427" y="376" class="node-title">3. 问题分类</text>
  <text x="427" y="400" class="node-sub">质量 / 物流 / 客服 / 退款</text>

  <rect x="735" y="345" width="210" height="78" class="box"/>
  <text x="757" y="376" class="node-title">4. 风险评估</text>
  <text x="757" y="400" class="node-sub">低 / 中 / 高风险，P1/P2/P3</text>

  <rect x="405" y="475" width="210" height="78" class="box"/>
  <text x="427" y="506" class="node-title">5. RAG 政策检索</text>
  <text x="427" y="530" class="node-sub">售后政策 / 话术模板</text>

  <rect x="735" y="475" width="210" height="78" class="box"/>
  <text x="757" y="506" class="node-title">6. 升级判断</text>
  <text x="757" y="530" class="node-sub">是否需要人工介入</text>

  <rect x="405" y="605" width="210" height="78" class="box"/>
  <text x="427" y="636" class="node-title">7. 售后策略</text>
  <text x="427" y="660" class="node-sub">退款 / 补偿 / 催物流 / 安抚</text>

  <rect x="735" y="605" width="210" height="78" class="box"/>
  <text x="757" y="636" class="node-title">8. 客服回复</text>
  <text x="757" y="660" class="node-sub">结合政策生成中文话术</text>

  <rect x="570" y="745" width="240" height="78" class="box box-out"/>
  <text x="592" y="776" class="node-title">9. 结果汇总</text>
  <text x="592" y="800" class="node-sub">结构化 JSON + 页面展示</text>

  <line x1="615" y1="254" x2="735" y2="254" class="arrow-blue"/>
  <path d="M 840 293 L 840 320 L 510 320 L 510 345" class="arrow-blue"/>
  <line x1="615" y1="384" x2="735" y2="384" class="arrow-blue"/>
  <path d="M 840 423 L 840 450 L 510 450 L 510 475" class="arrow-blue"/>
  <line x1="615" y1="514" x2="735" y2="514" class="arrow-blue"/>
  <path d="M 735 514 C 675 555, 660 582, 615 624" class="arrow"/>
  <path d="M 840 553 L 840 605" class="arrow-blue"/>
  <line x1="615" y1="644" x2="735" y2="644" class="arrow-blue"/>
  <path d="M 840 683 L 840 720 L 690 720 L 690 745" class="arrow-blue"/>

  <line x1="290" y1="375" x2="360" y2="375" class="arrow-blue"/>
  <text x="304" y="362" class="label">触发分析</text>
  <line x1="570" y1="823" x2="290" y2="710" class="arrow"/>

  <rect x="1060" y="120" width="370" height="250" class="panel"/>
  <text x="1084" y="154" class="panel-title">模型与算法能力</text>

  <rect x="1092" y="192" width="145" height="78" class="box box-ai"/>
  <text x="1112" y="222" class="node-title">DeepSeek API</text>
  <text x="1112" y="246" class="node-sub">结构化理解</text>

  <rect x="1255" y="192" width="145" height="78" class="box box-ai"/>
  <text x="1275" y="222" class="node-title">LALUN Adapter</text>
  <text x="1275" y="246" class="node-sub">中文 ASTE 实验</text>

  <rect x="1172" y="292" width="145" height="58" class="box box-ai"/>
  <text x="1192" y="320" class="node-title">业务规则引擎</text>
  <text x="1192" y="340" class="node-sub">风险评分 / 优先级</text>

  <rect x="1060" y="405" width="370" height="250" class="panel"/>
  <text x="1084" y="439" class="panel-title">知识库与数据层</text>

  <rect x="1092" y="475" width="145" height="78" class="box box-kb"/>
  <text x="1112" y="505" class="node-title">售后政策库</text>
  <text x="1112" y="529" class="node-sub">data/knowledge</text>

  <rect x="1255" y="475" width="145" height="78" class="box box-kb"/>
  <text x="1275" y="505" class="node-title">中文评论数据</text>
  <text x="1275" y="529" class="node-sub">MARC / JDDC 样例</text>

  <rect x="1172" y="575" width="145" height="58" class="box box-kb"/>
  <text x="1192" y="603" class="node-title">人工评估集</text>
  <text x="1192" y="623" class="node-sub">100 条样例</text>

  <rect x="1060" y="690" width="370" height="190" class="panel"/>
  <text x="1084" y="724" class="panel-title">评估与工程化</text>

  <rect x="1092" y="760" width="145" height="78" class="box box-qa"/>
  <text x="1112" y="790" class="node-title">pytest 测试</text>
  <text x="1112" y="814" class="node-sub">规则 / RAG / LALUN</text>

  <rect x="1255" y="760" width="145" height="78" class="box box-qa"/>
  <text x="1275" y="790" class="node-title">批量评估脚本</text>
  <text x="1275" y="814" class="node-sub">准确率 / 错误样本</text>

  <path d="M 945 254 C 1000 245, 1030 232, 1092 232" class="arrow-dashed"/>
  <path d="M 945 384 C 1030 372, 1088 338, 1172 321" class="arrow-dashed"/>
  <path d="M 945 644 C 1015 625, 1045 238, 1092 232" class="arrow-dashed"/>
  <path d="M 735 254 C 690 198, 1190 152, 1255 215" class="arrow-dashed"/>
  <path d="M 615 514 C 780 505, 955 505, 1092 514" class="arrow-dashed"/>
  <path d="M 1237 604 L 1328 760" class="arrow-dashed"/>
  <path d="M 1310 553 L 1328 760" class="arrow-dashed"/>

  <rect x="54" y="905" width="1372" height="46" fill="#ffffff" stroke="#d7dce5" rx="8"/>
  <text x="74" y="934" class="small">项目亮点：不是单轮问答，而是把电商售后场景拆成可解释的 Agent 流程；同时加入业务规则、RAG 政策依据、LALUN 研究模块和客观评估集，形成可展示、可复现、可迭代的作品集项目。</text>
</svg>
